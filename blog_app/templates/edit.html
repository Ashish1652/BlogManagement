<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>

    <style>
        #myid1{background-image=url("/static/wood2.jpg");
               background-repeat:no-repeat;
               background-size:cover;
               background-attachment:fixed;
               background-position:center;}

       #f1{position:absolute;
           top:35%;
           left:30%;
           font-size:20px;
           color:BLACK;
           text-transform:Capitalize;}
        #b1{position:absolute;
           top:105%;
           left:0%;
           background-color:black;
           color:white;

           border-width:2px;
           font-size:15px;
           text-decoration:underline}

         #f2{position:absolute;

           top:89%;
           left:70%;
           font-size:20px;
           color:white;
           text-transform:Capitalize;}

        #b2{position:absolute;
           top:105%;
           left:40%;
           background-color:black;
           color:white;

           border-width:2px;
           font-size:15px;
           text-decoration:underline}

        header{padding:10%;
               padding-bottom: 5px;

               font-size:60px;
               color:black;
               font-family : arial bold;
                }

       .container {
             margin: auto;
             width: 50rem;
             height: 35rem;
             box-shadow: 0 0 1rem 0 rgba(0, 0, 0, .2);
             border-radius: 5px;
             background-color: rgba(255, 255, 255, .15);
               text-align: left;
             backdrop-filter: blur(5px);
}

    </style>
    <meta charset="UTF-8">
    <title>Create Your Blog</title>
</head>

<body align="center" background="/static/images/CREATE1.jpg" id="myid1">

<div class="container">
    <header style="text-align:center;"> UPDATE BLOG</header>

    <form action="/updatedata/{{record.id}}" align="center" id="f1" method="post">
        {% csrf_token %}

        <p><label for="id_name">Name:</label> <input id="id_name" maxlength="100" name="name" required size="50"
                                                     type="text" value="{{record.name}}"></p>
        <p><label for="id_title">Title:</label> <input id="id_title" maxlength="500" name="title" required size="52"
                                                       type="text" value="{{record.title}}"></p>
        <p><label for="id_summery">Summery:</label> <textarea cols="40" id="id_summery" name="summery" required
                                                              rows="10"
                                                              wrap="hard"> {{record.summery}} </textarea></p>
        <!--        <input type="hidden" name="csrfmiddlewaretoken"-->
        <!--               value="BGz1iN9xYholKAEzUKdiXE1UPKWFjKK1YL2gIAV3NpEXZGDkxgqgMqVZdZ8anjCs">-->

        <button id="b1" type="submit">UPDATE BLOG</button>

    </form>

    <form action="/" align="center" id="f2">

        <button id="b2" type="submit">HOME</button>

    </form>
</div>

</body>
</html>
